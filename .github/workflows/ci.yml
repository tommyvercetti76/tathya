name: ci
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the repo. No workflow here ever needs write.
permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate content (schema + editorial rules)
        run: npm run validate
      - name: Build
        run: npm run build
